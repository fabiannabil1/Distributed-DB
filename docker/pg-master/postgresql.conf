# ============================================================================
# PostgreSQL Master Configuration - docker/pg-master/postgresql.conf
# ============================================================================

listen_addresses = '*'
port = 5432
max_connections = 200

# ===================== WAL (Write Ahead Log) =====================
wal_level = replica             # Minimal level needed for streaming replication
max_wal_senders = 10            # Max number of concurrent replication connections
wal_keep_size = 512             # WAL retention size in MB (ensures WAL is kept until replicas catch up)
max_replication_slots = 10      # Max replication slots

# ===================== Synchronous Replication =====================
# synchronous_standby_names = ''  # Keep async replication for simplicity
synchronous_commit = on

# ===================== Logging for Debugging =====================
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0644
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 0          # Log all queries (for read-write splitting proof)
log_statement = 'all'                   # Log every SQL statement
log_line_prefix = '[%t] [%d] [%u] [%h] %p '

# ===================== Archive =====================
archive_mode = off
