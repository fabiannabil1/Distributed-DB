# ============================================================================
# PostgreSQL Replica Configuration - docker/pg-replica/postgresql.conf
# ============================================================================

listen_addresses = '*'
port = 5432
max_connections = 200

# ===================== Replication (Standby) =====================
wal_level = replica
hot_standby = on                  # Allow read-only queries during recovery
hot_standby_feedback = on         # Tell master this replica is still catching up
max_wal_senders = 10
wal_receiver_timeout = 30s

# CRITICAL: Include auto-generated config from pg_basebackup -R
# This file contains primary_conninfo needed for replication
include_if_exists = '/var/lib/postgresql/data/postgresql.auto.conf'

# ===================== Logging for Debugging =====================
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0644
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 0          # Log all queries (for read-write splitting proof)
log_statement = 'all'                   # Log every SQL statement
log_line_prefix = '[%t] [%d] [%u] [%h] %p '
