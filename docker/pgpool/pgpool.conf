# ============================================================================
# Pgpool-II Configuration - docker/pgpool/pgpool.conf
# Key settings for Read-Write Splitting & Load Balancing
# ============================================================================

# ---- Connection Settings ----
listen_addresses = '*'
port = 5432
pcp_listen_addresses = '*'
pcp_port = 9898

# ---- Backend (PostgreSQL Servers) ----
# backend_hostname: IP/hostname of each PostgreSQL node
# backend_port: PostgreSQL port on that node
# backend_weight: Load balancing weight (0 = never use for SELECT, higher = more traffic)
# backend_flag: ALLOW_TO_FAILOVER enables automatic failover handling
backend_hostname0 = 'pg-master'
backend_port0 = 5432
backend_weight0 = 0
backend_flag0 = 'ALLOW_TO_FAILOVER'

backend_hostname1 = 'pg-replica1'
backend_port1 = 5432
backend_weight1 = 1
backend_flag1 = 'ALLOW_TO_FAILOVER'

backend_hostname2 = 'pg-replica2'
backend_port2 = 5432
backend_weight2 = 1
backend_flag2 = 'ALLOW_TO_FAILOVER'

# ---- Core Modes ----
load_balance_mode = on        # Enables SELECT queries to go to replicas
master_slave_mode = on        # Enables read-write splitting (write → master, read → replica)
master_slave_sub_mode = 'stream'  # Uses streaming replication detection

# ---- Health Check ----
# Pgpool-II periodically checks each backend to ensure availability
health_check_period = 10       # Seconds between health checks
health_check_timeout = 20      # Timeout for health check
health_check_user = 'repluser'
health_check_password = 'replpassword'
health_check_database = 'bdt_app'
health_check_max_retries = 3   # Retries before marking backend as down
health_check_retry_delay = 1   # Wait between retries

# ---- Streaming Replication Check ----
sr_check_period = 10           # Seconds between checking replication status
sr_check_user = 'repluser'
sr_check_password = 'replpassword'
sr_check_database = 'bdt_app'

# ---- Failover ----
failover_on_backend_error = on  # Automatically detach failed backends

# ---- Logging ----
log_connections = on            # Log each connection (for proof of distribution)
log_disconnections = on         # Log disconnections
log_statement = on              # Log all SQL statements
log_per_node_statement = on     # Log which backend handled each statement (CRITICAL for proof!)
client_min_messages = notice    # Verbosity level returned to clients

# ---- Connection Pooling ----
num_init_children = 32          # Initial child processes (concurrent connections)
max_pool = 4                    # Max cached connections per child per backend
child_life_time = 300           # Child life in seconds
child_max_connections = 0       # Unlimited connections per child
connection_life_time = 0        # Unlimited connection lifetime
client_idle_limit = 0           # Unlimited idle time

# ---- Watchdog (single Pgpool-II, disabled) ----
use_watchdog = off
